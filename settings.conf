# =============================================================================
# Configuracion del TFM Edge Blight Classifier
# =============================================================================
# Este fichero define rutas y parametros que dependen del entorno de ejecucion.
# El config.py de Python lee este fichero y expone las constantes al resto
# del proyecto.
#
# Para cambiar de entorno, edita la seccion [active] mas abajo o exporta
# la variable TFM_ENV antes de ejecutar tus scripts:
#     export TFM_ENV=edge
#
# Las secciones [local], [colab] y [edge] contienen los valores especificos
# de cada maquina. La seccion [active] selecciona cual usar por defecto.
# =============================================================================

[active]
# Entorno activo si no se define la variable de entorno TFM_ENV
# Valores validos: local, colab, edge
env = edge-train


# -----------------------------------------------------------------------------
# Maquina de entrenamiento (tu equipo con GPU)
# -----------------------------------------------------------------------------
[local]
data_base        = /media/victor/LAB_TFM
device           = auto
mixed_precision  = true
train_batch_size = 32
eval_batch_size  = 32
num_workers      = 4


# -----------------------------------------------------------------------------
# Google Colab (montando Drive en /content/drive)
# -----------------------------------------------------------------------------
[colab]
data_base        = /content/drive/MyDrive/TFM/datasets
device           = auto
mixed_precision  = true
train_batch_size = 64
eval_batch_size  = 64
num_workers      = 2


# -----------------------------------------------------------------------------
# Dispositivos Edge (Raspberry Pi 4 / Jetson Orin Nano)
# Solo inferencia; recursos limitados.
# -----------------------------------------------------------------------------
[edge]
data_base        = /home/victor/Documents/datasets  #/home/victor/datasets
device           = cpu
mixed_precision  = false
train_batch_size = 1
eval_batch_size  = 1
num_workers      = 0


[edge-train]
data_base        = /home/victor/Documents/  #/home/victor/datasets
device           = auto
mixed_precision  = true
train_batch_size = 64
eval_batch_size  = 64
num_workers      = 2


# =============================================================================
# Parametros experimentales (compartidos entre todos los entornos)
# =============================================================================
[experiment]
seed             = 42
weight_decay     = 1e-4
max_total_epochs = 50
quant_threshold  = 0.02
priority_class   = late_blight


[phase1]
# Fine-tuning de dominio: backbone congelado, cabeza nueva
epochs       = 5
lr           = 1e-3
freeze       = true
es_patience  = 3
datasets     = plantvillage, mendeley_ue, tilahun


[phase2]
# Fine-tuning especifico: backbone descongelado, datos de campo
epochs       = 25
lr           = 1e-4
freeze       = false
es_patience  = 7
datasets     = quizhpe #, propio


[splits]
phase1_train = 0.80
phase1_val   = 0.20
phase1_test  = 0.00

phase2_train = 0.70
phase2_val   = 0.15
phase2_test  = 0.15

final_test_datasets = propio


[edge_benchmark]
warmup_iters      = 20
measured_iters    = 1000
subset_size       = 100
energy_duration_s = 600
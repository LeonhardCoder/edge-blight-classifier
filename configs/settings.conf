# =============================================================================
# Edge Blight Classifier - Configuracion central
# =============================================================================
# Cambiar de entorno: editar [active].env o exportar TFM_ENV=edge_rpi (etc.)
# =============================================================================

[active]
# Entorno por defecto si no se exporta TFM_ENV
# Opciones: local | colab
env = edge-train


# -----------------------------------------------------------------------------
# Entorno: maquina local de entrenamiento (con o sin GPU)
# -----------------------------------------------------------------------------
[local]
data_base        = /home/victor/Documents
device           = auto
mixed_precision  = true
train_batch_size = 32
eval_batch_size  = 32
num_workers      = 4

[edge-train]
data_base        = /home/victor/Documents/  #/home/victor/datasets
device           = auto
mixed_precision  = true
train_batch_size = 64
eval_batch_size  = 64
num_workers      = 2

# -----------------------------------------------------------------------------
# Entorno: Google Colab
# -----------------------------------------------------------------------------
[colab]
data_base        = /content/drive/MyDrive/UOC/TFM/LAB
device           = auto
mixed_precision  = true
train_batch_size = 64
eval_batch_size  = 64
num_workers      = 2


# -----------------------------------------------------------------------------
# Entorno: Raspberry Pi 4 (solo inferencia)
# -----------------------------------------------------------------------------
[edge_rpi]
data_base        = /home/victor/edge_data
device           = cpu
mixed_precision  = false
train_batch_size = 1
eval_batch_size  = 1
num_workers      = 0


# -----------------------------------------------------------------------------
# Entorno: Jetson Orin Nano (solo inferencia)
# -----------------------------------------------------------------------------
[edge_jetson]
data_base        = /home/victor/edge_data
device           = cuda
mixed_precision  = true
train_batch_size = 1
eval_batch_size  = 1
num_workers      = 2


# =============================================================================
# Parametros experimentales (compartidos en todos los entornos)
# =============================================================================
[experiment]
seed             = 42
weight_decay     = 1e-4
priority_class   = late_blight


[training]
# Un solo entrenamiento por modelo (no hay fases)
epochs           = 25
lr               = 1e-3
es_patience      = 7
img_size         = 224


[splits]
# Split unico sobre el corpus consolidado (4 datasets etiquetados mezclados)
train = 0.70
val   = 0.15
test  = 0.15


[edge_benchmark]
# Configuracion de las mediciones en dispositivo Edge
warmup_iters     = 20
measured_iters   = 500
subset_size      = 100


[quantization]
# Umbral de degradacion aceptable de F1-macro tras cuantizar
threshold        = 0.02


# =============================================================================
# Matriz de formatos a evaluar por dispositivo Edge
# =============================================================================
[matrix_rpi]
# Raspberry Pi 4: solo CPU ARM
# Formatos a probar: TFLite-INT8 (nativo), ONNX-FP16 (opcional)
formats = tflite_int8, onnx_fp16


[matrix_jetson]
# Jetson Orin Nano: GPU CUDA + tensor cores
# Formatos a probar: TensorRT-FP16 (nativo), ONNX-FP16, TensorRT-INT8 (opcional)
formats = trt_fp16, onnx_fp16, trt_int8
